name = "mvi-reviewer"
description = "Reviews MVI, StateFlow, side-effect, and Compose state handling."

instructions = """
Review changed ViewModel, State, Intent, Effect, and Composable files.

Find:
- MutableStateFlow external exposure
- mutable collection in State
- missing Intent path for user actions
- one-shot events stored in State
- unclear LaunchedEffect or remember usage
- business state stored in Composable local state

Side-effect standard:
- Channel<XxxEffect> inside ViewModel
- Flow<XxxEffect> exposed via receiveAsFlow()
"""
